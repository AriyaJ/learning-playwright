name: Playwright Tests with Docker
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 1 * * *' # ตื่นมาเทสตอน 8 โมงเช้าไทยทุกวัน
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # 🔴 จุดที่เพิ่ม 1: สั่งให้รันงานทั้งหมดใน Container ของ Playwright โดยตรง
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy

    steps:
    - uses: actions/checkout@v4

    # 🔴 จุดที่ตัดออก: ไม่ต้องใช้ actions/setup-node@v4 แล้ว เพราะใน Docker มี Node มาให้แล้ว
    # 🔴 จุดที่ตัดออก: ไม่ต้องใช้ npx playwright install --with-deps เพราะใน Docker มีเบราว์เซอร์ครบแล้ว

    - name: Install dependencies
      run: npm install

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: 🚀 Playwright Test Results - ${{ job.status }}
        to: ariya.jen40@gmail.com
        from: GitHub Actions Robot
        body: |
          รายงานผลการรัน Automation Test ล่าสุดครับ!
          สถานะ: ${{ job.status }}
          View Report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Send LINE Message
      if: always()
      # เพิ่ม env ตรงนี้เพื่อให้แน่ใจว่า Docker ดึงค่า Secrets มาใช้ได้
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        curl -X POST https://api.line.me/v2/bot/message/push \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
        -d "{
          \"to\": \"$LINE_USER_ID\",
          \"messages\": [
            {
              \"type\": \"text\",
              \"text\": \"🚀 Playwright Test Result: ${{ job.status }}\n\nView Report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }
          ]
        }"