name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 1 * * *' # ตื่นมาเทสตอน 8 โมงเช้าไทยทุกวัน
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: 🚀 Playwright Test Results - ${{ job.status }}
        to: ariya.jen40@gmail.com
        from: GitHub Actions Robot
        body: |
          รายงานผลการรัน Automation Test ล่าสุดครับ!
          
          สถานะ: ${{ job.status }}
          ชื่อ Repository: ${{ github.repository }}
          
          เข้าไปดูรายละเอียดและ Report ได้ที่นี่:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    - name: Send LINE Message
      if: always()
      run: |
        curl -X POST https://api.line.me/v2/bot/message/push \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${{ secrets.LINE_ACCESS_TOKEN }}" \
        -d '{
          "to": "${{ secrets.LINE_USER_ID }}",
          "messages": [
            {
              "type": "text",
              "text": "🚀 Playwright Test Result: ${{ job.status }}\n\nRepository: ${{ github.repository }}\nView Report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
          ]
        }'