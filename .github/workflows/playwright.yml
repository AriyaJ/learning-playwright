  name: Playwright Tests with Docker
  on:
    push:
      branches: [ main, master ]
    pull_request:
      branches: [ main, master ]
    schedule:
      - cron: '30 0 * * *'
    workflow_dispatch:

  jobs:
    test:
      timeout-minutes: 60
      runs-on: ubuntu-latest
      container:
        image: mcr.microsoft.com/playwright:v1.58.2-jammy

      steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: apt-get update && apt-get install -y jq

      - name: Run Playwright tests
        run: npx playwright test

      # 🔍 1. ต้องเพิ่ม Step นี้: เพื่อไปหาไฟล์ Screenshot และ Video ในเครื่อง Docker
      - name: Find Latest Failure Evidence
        if: failure()
        id: find_evidence
        run: |
          SCREENSHOT_PATH=$(find test-results -name "*.png" | head -n 1)
          echo "screenshot_path=$SCREENSHOT_PATH" >> $GITHUB_OUTPUT
          
          # แก้ตรงนี้ให้หา .webm ได้ด้วยตามที่เห็นใน Log ของคุณ
          VIDEO_PATH=$(find test-results -name "*.webm" -o -name "*.mp4" | head -n 1)
          echo "video_path=$VIDEO_PATH" >> $GITHUB_OUTPUT

    # ☁️ 2. เปลี่ยนมาใช้ Catbox สำหรับรูปด้วยเลย (ในเมื่อส่งวิดีโอผ่าน รูปก็ต้องผ่าน)
      - name: Upload Screenshot to Catbox
        if: failure()
        id: upload_screenshot
        continue-on-error: true 
        run: |
          # Catbox ใช้ง่าย ไม่ต้องใช้ jq แกะ JSON เพราะมันคืนค่าเป็น Link ตรงๆ เลย
          RESPONSE=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@${{ steps.find_evidence.outputs.screenshot_path }}" https://catbox.moe/user/api.php)
          echo "image_url=$RESPONSE" >> $GITHUB_OUTPUT
          fi

      # ☁️ 3. ฝากวิดีโอ (เพิ่ม timeout และ continue-on-error)
      - name: Upload Video
        if: failure()
        id: upload_video
        continue-on-error: true # ✨ ถ้าเน็ตเน่าจนอัปโหลดไม่ได้ ให้ข้ามไปส่ง LINE เลย
        run: |
          cp ${{ steps.find_evidence.outputs.video_path }} evidence_video.mp4
          # เพิ่ม --connect-timeout 30 วินาที ไม่ให้รันค้างนานเกินไป
          RESPONSE=$(curl -s --connect-timeout 30 -F "reqtype=fileupload" -F "fileToUpload=@evidence_video.mp4" https://catbox.moe/user/api.php)
          echo "video_url=$RESPONSE" >> $GITHUB_OUTPUT

      # 📦 เก็บ Artifact เหมือนเดิม
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 📧 ส่งเมล (แบบปรับข้อความตามสถานะที่คุณต้องการ)
      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ job.status == 'success' && '🚀' || '🔴' }} Playwright Test Results - ${{ job.status }}
          to: ariya.jen40@gmail.com
          from: GitHub Actions Robot
          body: |
            รายงานผลการรัน Automation Test ล่าสุดครับ!
            สถานะ: ${{ job.status }}
            ${{ job.status == 'failure' && '⚠️ ตรวจพบข้อผิดพลาด: ดูรูปและคลิปหลักฐานได้ใน LINE นะครับ' || '✅ ผ่านเรียบร้อยดีครับ' }}
            Link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    # 🔴 ส่ง LINE (แยกส่วนส่ง เพื่อความชัวร์)
      - name: Send LINE Notification
        if: failure()
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          IMAGE_URL: ${{ steps.upload_screenshot.outputs.image_url }}
          VIDEO_URL: ${{ steps.upload_video.outputs.video_url }}
        run: |
          # 1. รวมลิงก์ทั้งหมดไว้ในข้อความเดียว (ถ้าอันไหนอัปโหลดไม่สำเร็จ ลิงก์จะเป็นค่าว่าง)
          MSG="🔴 Playwright Test Failed!"
          [ ! -z "$IMAGE_URL" ] && MSG="$MSG\n📸 รูป: $IMAGE_URL"
          [ ! -z "$VIDEO_URL" ] && MSG="$MSG\n🎥 คลิป: $VIDEO_URL"
          MSG="$MSG\n🔗 Report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # ส่งข้อความตัวอักษรก่อน (ก้อนนี้ต้องเด้งแน่ๆ เพราะไม่มีรูป/วิดีโอมาดึงให้พัง)
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
          -d "{
            \"to\": \"$LINE_USER_ID\",
            \"messages\": [
              { \"type\": \"text\", \"text\": \"$MSG\" }
            ]
          }"

          # 2. ถ้ามีรูปภาพสำเร็จ ให้ส่งรูปตามไปแยกอีก 1 ข้อความ (ถ้าพังก็ไม่ดึงก้อนแรกตาย)
          if [ ! -z "$IMAGE_URL" ] && [ "$IMAGE_URL" != "null" ]; then
            curl -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
            -d "{
              \"to\": \"$LINE_USER_ID\",
              \"messages\": [
                {
                  \"type\": \"image\",
                  \"originalContentUrl\": \"$IMAGE_URL\",
                  \"previewImageUrl\": \"$IMAGE_URL\"
                }
              ]
            }"
          fi