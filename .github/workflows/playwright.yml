name: Playwright Tests with Docker
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '30 0 * * *' # ตื่นมาเทสตอน 7.30 โมงเช้าไทยทุกวัน
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # 🔴 จุดที่เพิ่ม 1: สั่งให้รันงานทั้งหมดใน Container ของ Playwright โดยตรง
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy

    steps:
    - uses: actions/checkout@v4

    # 🔴 จุดที่ตัดออก: ไม่ต้องใช้ actions/setup-node@v4 แล้ว เพราะใน Docker มี Node มาให้แล้ว
    # 🔴 จุดที่ตัดออก: ไม่ต้องใช้ npx playwright install --with-deps เพราะใน Docker มีเบราว์เซอร์ครบแล้ว

    - name: Install dependencies
      run: npm install

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        # หัวข้อเมลจะเปลี่ยนตามสถานะ (Success/Failure)
        subject: ${{ job.status == 'success' && '🚀' || '🔴' }} Playwright Test Results - ${{ job.status }}
        to: ariya.jen40@gmail.com
        from: GitHub Actions Robot
        body: |
          รายงานผลการรัน Automation Test ล่าสุดครับ!
          
          สถานะ: ${{ job.status }}
          ชื่อ Repository: ${{ github.repository }}
          
          ${{ job.status == 'failure' && '⚠️ ตรวจพบข้อผิดพลาด: สามารถเข้าไปดูรูป Screenshot และคลิปวิดีโอหลักฐานได้ใน LINE นะครับ' || '✅ การทดสอบผ่านเรียบร้อยดีครับ' }}
          
          เข้าไปดูรายละเอียดและ Report เต็มๆ ได้ที่นี่:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    # 🟢 1. กรณีเทส "ผ่าน" (Success) -> ส่งจรวดลำเดิม
    - name: Send LINE Message (Success)
      if: success()
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        curl -X POST https://api.line.me/v2/bot/message/push \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
        -d "{
          \"to\": \"$LINE_USER_ID\",
          \"messages\": [
            {
              \"type\": \"text\",
              \"text\": \"🚀 Playwright Test Result: success\nView: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }
          ]
        }"

    # 🔴 2. กรณีเทส "พัง" (Failure) -> ส่งรูป + คลิป (ตามโค้ดใหม่)
    - name: Send LINE Message with Evidence (Failure)
      if: failure()
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        IMAGE_URL: ${{ steps.upload_screenshot.outputs.image_url }}
        VIDEO_URL: ${{ steps.upload_video.outputs.video_url }}
      run: |
        curl -X POST https://api.line.me/v2/bot/message/push \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
        -d "{
          \"to\": \"$LINE_USER_ID\",
          \"messages\": [
            {
              \"type\": \"text\",
              \"text\": \"🔴 Playwright Test Result: Failed\nเจอจุดพังครับ! ดูรูปและคลิปด้านล่างได้เลย\"
            },
            {
              \"type\": \"image\",
              \"originalContentUrl\": \"$IMAGE_URL\",
              \"previewImageUrl\": \"$IMAGE_URL\"
            },
            {
              \"type\": \"video\",
              \"originalContentUrl\": \"$VIDEO_URL\",
              \"previewImageUrl\": \"$IMAGE_URL\"
            }
          ]
        }"