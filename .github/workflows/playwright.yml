  name: Playwright Tests with Docker
  on:
    push:
      branches: [ main, master ]
    pull_request:
      branches: [ main, master ]
    schedule:
      - cron: '30 0 * * *'
    workflow_dispatch:

  jobs:
    test:
      timeout-minutes: 60
      runs-on: ubuntu-latest
      container:
        image: mcr.microsoft.com/playwright:v1.58.2-jammy

      steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: apt-get update && apt-get install -y jq

      - name: Run Playwright tests
        run: npx playwright test

      # 🔍 1. ต้องเพิ่ม Step นี้: เพื่อไปหาไฟล์ Screenshot และ Video ในเครื่อง Docker
      - name: Find Latest Failure Evidence
        if: failure()
        id: find_evidence
        run: |
          SCREENSHOT_PATH=$(find test-results -name "*.png" | head -n 1)
          echo "screenshot_path=$SCREENSHOT_PATH" >> $GITHUB_OUTPUT
          
          # แก้ตรงนี้ให้หา .webm ได้ด้วยตามที่เห็นใน Log ของคุณ
          VIDEO_PATH=$(find test-results -name "*.webm" -o -name "*.mp4" | head -n 1)
          echo "video_path=$VIDEO_PATH" >> $GITHUB_OUTPUT

      # ☁️ 2. ต้องเพิ่ม Step นี้: เพื่อเอารูปที่หาเจอ อัปโหลดขึ้นเว็บ imghippo
      - name: Upload Screenshot to Imghippo
        if: failure() && steps.find_evidence.outputs.screenshot_path != ''
        id: upload_screenshot
        run: |
          RESPONSE=$(curl -s -X POST -F "file=@${{ steps.find_evidence.outputs.screenshot_path }}" https://api.imghippo.com/v1/upload)
          echo "Imghippo Response: $RESPONSE" 
          IMAGE_URL=$(echo $RESPONSE | jq -r '.data.url')
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT

      # ☁️ 3. ต้องเพิ่ม Step นี้: เพื่อเอาวิดีโออัปโหลดขึ้นเว็บ catbox
      - name: Upload Video to Catbox
        if: failure() && steps.find_evidence.outputs.video_path != ''
        id: upload_video
        run: |
          RESPONSE=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@${{ steps.find_evidence.outputs.video_path }}" https://catbox.moe/user/api.php)
          echo "Catbox Video URL: $RESPONSE"
          echo "video_url=$RESPONSE" >> $GITHUB_OUTPUT

      # 📦 เก็บ Artifact เหมือนเดิม
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 📧 ส่งเมล (แบบปรับข้อความตามสถานะที่คุณต้องการ)
      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ job.status == 'success' && '🚀' || '🔴' }} Playwright Test Results - ${{ job.status }}
          to: ariya.jen40@gmail.com
          from: GitHub Actions Robot
          body: |
            รายงานผลการรัน Automation Test ล่าสุดครับ!
            สถานะ: ${{ job.status }}
            ${{ job.status == 'failure' && '⚠️ ตรวจพบข้อผิดพลาด: ดูรูปและคลิปหลักฐานได้ใน LINE นะครับ' || '✅ ผ่านเรียบร้อยดีครับ' }}
            Link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # 🟢 ส่ง LINE (กรณีรันผ่าน - ส่งแค่ข้อความ)
      - name: Send LINE Message (Success)
        if: success()
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
          -d "{\"to\": \"$LINE_USER_ID\", \"messages\": [{\"type\": \"text\", \"text\": \"🚀 Playwright SUCCESS!\"}]}"

      # 🔴 ส่ง LINE (กรณีรันพัง - ส่งรูป + คลิป)
      - name: Send LINE Message with Evidence (Failure)
        if: failure()
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          IMAGE_URL: ${{ steps.upload_screenshot.outputs.image_url }}
          VIDEO_URL: ${{ steps.upload_video.outputs.video_url }}
        run: |
          # แยกส่งเป็น 2 ชุดเพื่อความชัวร์ (ถ้าคลิปพัง รูปยังต้องเด้ง)
          # 1. ส่งข้อความ + รูป
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
          -d "{
            \"to\": \"$LINE_USER_ID\",
            \"messages\": [
              { \"type\": \"text\", \"text\": \"🔴 Test Failed! ดูหลักฐานด้านล่าง\" },
              { \"type\": \"image\", \"originalContentUrl\": \"$IMAGE_URL\", \"previewImageUrl\": \"$IMAGE_URL\" }
            ]
          }"
          # 2. ส่งวิดีโอ (ถ้ามี)
          if [ ! -z "$VIDEO_URL" ] && [ "$VIDEO_URL" != "null" ]; then
            curl -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
            -d "{
              \"to\": \"$LINE_USER_ID\",
              \"messages\": [
                { \"type\": \"video\", \"originalContentUrl\": \"$VIDEO_URL\", \"previewImageUrl\": \"$IMAGE_URL\" }
              ]
            }"
          fi